# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is overridden in env.py from the DATABASE_URL environment variable.
# Leave this as a placeholder — it is never used directly.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Uncomment to auto-format migration files with Black after generation:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
