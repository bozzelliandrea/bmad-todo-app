name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint & type checking ──────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev dependencies
        run: pip install -e ".[dev]" -q
        working-directory: backend

      - name: Ruff — lint
        run: ruff check .
        working-directory: backend

      - name: Ruff — format check
        run: ruff format --check .
        working-directory: backend

      - name: Mypy — type check
        run: mypy app
        working-directory: backend

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: frontend

  # ─── Job 2: Backend unit & integration tests with coverage ────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev dependencies
        run: pip install -e ".[dev]" -q
        working-directory: backend

      - name: Run pytest with coverage
        run: pytest -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

  # ─── Job 3: End-to-end tests ──────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create environment files
        run: |
          cp .env.example .env
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env

      - name: Start full stack
        run: docker compose up --build -d
        timeout-minutes: 5

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Backend ready" && break
            echo "Waiting… ($i/30)" && sleep 3
          done

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && echo "Frontend ready" && break
            echo "Waiting… ($i/20)" && sleep 3
          done

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Stop stack
        if: always()
        run: docker compose down -v
